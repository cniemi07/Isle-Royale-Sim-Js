<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

     <link rel="stylesheet" href="style.css">
    <script src ="https://cdn.jsdelivr.net/npm/chart.js" defer></script>

     <title>Isle Royale Wolf-Moose Population Simulator</title>

<body>
    <header>    
    
    <h1 >Isle Royale Wolf-Moose Population Simulator</h1>

</header>
<h1>The Stats</h1> 
       <hr>
    <div id = "stats">
       

       <div class="stat-card">

       </div>
       <div class="stat-card">
        <p class="pop">Peak Wolf Population</p>
       <p class="pop-num">51</p>
       </div>
       <div class="stat-card">
        <p class="pop">Current Moose Population</p>
       <p class="pop-num">524</p>
       </div>
       <div class="stat-card">
        <p class="pop">Current Wolf Population</p>
       <p class="pop-num">37</p>
       </div>



    </div>
    


    <div id= "charts">
        <canvas id ="pop-chart"></canvas>

       
    </div>


</body>
</html>
